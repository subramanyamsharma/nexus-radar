    function generateFakeSat(sat) {
      const t = Date.now() / 1000;
      const norad = sat.noradId;
      let alt, incl, period;
      const isGEO=sat.type==='COMMS'&&norad>35000||sat.name.includes('GOES')||sat.name.includes('Meteosat')||sat.name.includes('Yamal')||sat.name.includes('Astra')||sat.name.includes('Intelsat')&&norad>25000||sat.name.includes('Eutelsat')||sat.name.includes('Hotbird')||sat.name.includes('SES')&&norad>40000||sat.name.includes('APStar')||sat.name.includes('AsiaSat')||sat.name.includes('GSAT')&&norad>39000||sat.name.includes('ViaSat-3');
      const isMEO=sat.type==='NAVIGATION';
      
      if(isGEO){alt=35786;incl=0.05;period=24*60;}
      else if(isMEO){alt=sat.name.includes('Galileo')?23222:sat.name.includes('GLONASS')?19100:sat.name.includes('BeiDou')&&sat.name.includes('GEO')?35786:sat.name.includes('BeiDou')?21528:20200;incl=55+(norad%20)-10;period=12*60;}
      else{alt=400+((norad*7+13)%800);incl=51.6+((norad*3)%45)-22;period=90+((norad*2)%25);}
      
      // Add a slight randomization for generated swarm sats based on their huge ID
      const offset = norad > 60000 ? norad * 0.13 : 0;
      
      const angle = ((t / 60 / period) * 360 + (norad * 137.508) + offset) % 360;
      const lat = isGEO ? 0.05 * Math.sin(angle * Math.PI / 180) : Math.sin((angle + norad * 0.7 + offset) * Math.PI / 180) * Math.min(Math.abs(incl), 80);
      let lon = isGEO ? ((norad * 13.7) % 360) - 180 : ((angle * 1.3 + norad * 19.47 + offset) % 360) - 180;
      const vel = isGEO ? 3.07 : isMEO ? 3.87 : 7.66;
      
      return { ...sat, lat: Math.max(-80, Math.min(80, lat)), lon, alt: Math.round(alt), vel: parseFloat(vel.toFixed(2)), footprint: Math.round(Math.sqrt(2 * 6371 * (alt / 1000)) * 80), visibility: 'eclipsed' };
    }

    function generateSwarmSatellites(count) {
      const swarm = [];
      for (let i = 0; i < count; i++) {
        const isStarlink = Math.random() > 0.3;
        swarm.push({
          id: `SWARM-${i}`,
          name: isStarlink ? `Starlink-${Math.floor(Math.random()*9000)+1000}` : `OneWeb-${Math.floor(Math.random()*1000)+100}`,
          type: 'COMMS',
          noradId: 60000 + i,
          color: isStarlink ? '#f472b6' : '#f9a8d4',
          emoji: '📶'
        });
      }
      return swarm;
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function calcETA(sat, tgtCoords) {
      const dist = haversineKm(sat.lat, sat.lon, tgtCoords.lat, tgtCoords.lon);
      const gv = sat.alt > 30000 ? 0.5 : sat.alt > 5000 ? 1.5 : sat.vel * 0.8 || 6;
      const secs = dist / gv;
      if (secs < 60) return { text: `${Math.round(secs)}s`, badge: 'near' };
      if (secs < 3600) return { text: `${Math.floor(secs / 60)}m ${Math.round(secs % 60)}s`, badge: 'mid' };
      if (secs < 86400) return { text: `${Math.floor(secs / 3600)}h ${Math.floor((secs % 3600) / 60)}m`, badge: 'far' };
      return { text: `${Math.floor(secs / 86400)}d ${Math.floor((secs % 86400) / 3600)}h`, badge: 'far' };
    }

        if (!vehicleCountry) return [];
        return [...new Set(vehicleData.filter(v => v.country === vehicleCountry).map(v => v.state))].sort();
      }, [vehicleData, vehicleCountry]);
      const availableRoadCities = useMemo(() => {
        if (!vehicleState) return [];
        return [...new Set(vehicleData.filter(v => v.state === vehicleState).map(v => v.city))].sort();
      }, [vehicleData, vehicleState]);

      const filteredVehicles = useMemo(() => {
        const s = vehicleSearch.toLowerCase();
        return vehicleData.filter(v => {
          const ms = !s || (v.id.toLowerCase().includes(s) || v.type.toLowerCase().includes(s));
          const mc = !vehicleCountry || v.country === vehicleCountry;
          const mSt = !vehicleState || v.state === vehicleState;
          const mCi = !vehicleCity || v.city === vehicleCity;
          return ms && mc && mSt && mCi;
        });
      }, [vehicleData, vehicleSearch, vehicleCountry, vehicleState, vehicleCity]);


      // Update Map Markers 
      useEffect(() => {
        if (!flightMapRef.current) return;
        const map = flightMapRef.current;
        Object.values(flightMarkersRef.current).forEach(m => map.removeLayer(m));
        flightMarkersRef.current = {};

        // Render ALL map markers (removed slice limitation)
        filteredFlights.forEach(f => {
          const m = window.L.marker([f.lat, f.lon], { icon: makePlaneIcon(f.hdg) });
          m.bindPopup(`
            <div class="popup-title">✈ ${f.callsign}</div>
            <div class="popup-row"><span>OPERATOR</span><span>${f.operator || f.country}</span></div>
            <div class="popup-row"><span>FROM</span><span class="popup-route">${f.originCity || '?'}, ${f.originCountry || '?'}</span></div>
            <div class="popup-row"><span>TO</span><span class="popup-route">${f.destCity || '?'}, ${f.destCountry || '?'}</span></div>
            <div class="popup-row"><span>ALTITUDE</span><span>${f.alt ? f.alt + 'm' : '—'}</span></div>
            <div class="popup-row"><span>SPEED</span><span>${f.spd ? f.spd + ' kts' : '—'}</span></div>
            <div class="popup-row"><span>HEADING</span><span>${Math.round(f.hdg)}°</span></div>

          m.on('click', () => setSelectedFlight(f));
          m.addTo(map);
          flightMarkersRef.current[f.icao] = m;
        });

      useEffect(() => {
        if (!satMapRef.current) return;
        const map = satMapRef.current;
        satOrbitLinesRef.current.forEach(l => map.removeLayer(l));
        satOrbitLinesRef.current = [];
        Object.values(satMarkersRef.current).forEach(m => map.removeLayer(m));
        satMarkersRef.current = {};

        filteredSats.forEach(sat => {
          const eta = calcETA(sat, targetCoords);
          const orbit = sat.alt > 30000 ? 'GEO' : sat.alt > 5000 ? 'MEO' : 'LEO';

          const m = window.L.marker([sat.lat, sat.lon], { icon: makeSatIcon(sat) });

            <div class="popup-title sat-title">${sat.emoji} ${sat.name}</div>
            <div class="popup-row"><span>TYPE</span><span>${sat.type}</span></div>
            <div class="popup-row"><span>NORAD ID</span><span>${sat.noradId}</span></div>
            <div class="popup-row"><span>ORBIT</span><span>${orbit} · ${sat.alt} km</span></div>
            <div class="popup-row"><span>VELOCITY</span><span>${sat.vel} km/s</span></div>
            <div class="popup-row"><span>POSITION</span><span>${sat.lat.toFixed(2)}°, ${sat.lon.toFixed(2)}°</span></div>

          m.on('click', () => setSelectedSat(sat));
          m.addTo(map);
          satMarkersRef.current[sat.id] = m;

          const circle = window.L.circle([sat.lat, sat.lon], {
            radius: (sat.footprint || 2000) * 400,
            color: sat.color, fillColor: sat.color, fillOpacity: 0.015, weight: 0.3, opacity: 0.1

      useEffect(() => {
        if (!shipMapRef.current) return;
        const map = shipMapRef.current;
        Object.values(shipMarkersRef.current).forEach(m => map.removeLayer(m));
        shipMarkersRef.current = {};

          m.bindPopup(`
            <div class="popup-title" style="color:#fbbf24">🚢 ${shp.name}</div>
            <div class="popup-row"><span>TYPE</span><span>${shp.type}</span></div>
            <div class="popup-row"><span>FLAG</span><span>${shp.flag}</span></div>
            <div class="popup-row"><span>ROUTE</span><span class="popup-route" style="color:#f59e0b !important">${shp.origin} → ${shp.dest}</span></div>
            <div class="popup-row"><span>SPEED</span><span>${shp.spd} kts</span></div>
            <div class="popup-row"><span>HEADING</span><span>${Math.round(shp.hdg)}°</span></div>
            <div class="popup-row"><span>POSITION</span><span>${shp.lat.toFixed(2)}°, ${shp.lon.toFixed(2)}°</span></div>

      useEffect(() => {
        if (!roadMapRef.current) return;
        const map = roadMapRef.current;

          const m = window.L.marker([veh.lat, veh.lon], { icon: makeVehicleIcon(veh.hdg, veh.type) });

            <div class="popup-row"><span>TYPE</span><span>${veh.type}</span></div>
            <div class="popup-row"><span>COUNTRY</span><span>${veh.country}</span></div>
            <div class="popup-row"><span>STATE</span><span>${veh.state}</span></div>
            <div class="popup-row"><span>CITY</span><span class="popup-route" style="color:#f87171 !important">${veh.city}</span></div>
            <div class="popup-row"><span>SPEED</span><span>${veh.spd} km/h</span></div>
            <div class="popup-row"><span>HEADING</span><span>${Math.round(veh.hdg)}°</span></div>
          `);
          m.on('click', () => setSelectedVehicle(veh));
          m.addTo(map);
          roadMarkersRef.current[veh.id] = m;
        });
      }, [filteredVehicles]);

      // FlyTo Logic
      const flyToFlight = (f) => { setSelectedFlight(f); flightMapRef.current?.setView([f.lat, f.lon], 6); };
      const flyToSat = (sat) => { setSelectedSat(sat); satMapRef.current?.setView([sat.lat, sat.lon], sat.alt > 5000 ? 2 : 4); };
      const flyToShip = (shp) => { setSelectedShip(shp); shipMapRef.current?.setView([shp.lat, shp.lon], 5); };
      const flyToVehicle = (veh) => { setSelectedVehicle(veh); roadMapRef.current?.setView([veh.lat, veh.lon], 11); };

      // Computed Satellite Stats
      const leoCount = satData.filter(s => s.alt < 2000).length;
      const avgSatVel = satData.length > 0 ? (satData.reduce((a, s) => a + (s.vel || 7.66), 0) / satData.length).toFixed(1) : 0;
      let nearestSatName = '—';
      let nearestDist = Infinity;
      filteredSats.forEach(s => {

        if(dist < nearestDist) { nearestDist = dist; nearestSatName = s.name; }

      return (
        <div className="nexus-app-container">
          <header>

              <button className={`tab-btn ship-tab ${activeTab === 'ship' ? 'active' : ''}`} onClick={() => setActiveTab('ship')}>🚢 MARITIME RADAR</button>

                        </div>
                      </div>

                <div className="map-area">
                  <div className={`loading-screen ${!flightLoading ? 'hidden' : ''}`}>
                    <div className="loader-ring"></div>

                  <div id="flight-map" style={{ width: '100%', height: '100%' }}></div>

                    <button className="map-ctrl" onClick={() => flightMapRef.current?.setView([-25, 133], 4)}>🗺 OCEANIA</button>
                  </div>
                  {selectedFlight && (
                    <div className="info-panel visible">
                      <div className="info-field"><label>CALLSIGN</label><span>{selectedFlight.callsign}</span></div>
                      <div className="info-field"><label>ROUTE</label><span className="route-span">{`${selectedFlight.originCity || '?'}→${selectedFlight.destCity || '?'}`}</span></div>
                      <div className="info-field"><label>ALTITUDE</label><span>{selectedFlight.alt ? selectedFlight.alt + 'm' : 'N/A'}</span></div>
                      <div className="info-field"><label>SPEED</label><span>{selectedFlight.spd ? selectedFlight.spd + ' kts' : 'N/A'}</span></div>
                      <div className="info-field"><label>HEADING</label><span>{Math.round(selectedFlight.hdg)}°</span></div>
                      <div className="info-field"><label>OPERATOR</label><span>{selectedFlight.operator || selectedFlight.country || 'N/A'}</span></div>
                    </div>
                  )}
                </div>
              </div>
              <div className="ticker">
                <div className="ticker-inner">
                  {[...flightData.slice(0, 60), ...flightData.slice(0, 60)].map((f, i) => (
                    <span key={i} className="ticker-item"><b>{f.callsign}</b> {f.originCity || '?'} → {f.destCity || '?'} · {f.alt || '?'}m · {f.spd || '?'}kts</span>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* ══ SATELLITE TRACKER ══ */}
          <div className={`dashboard ${activeTab === 'sat' ? 'active' : ''}`} id="dash-sat">
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              <div className="sat-layout" style={{ flex: 1 }}>
                <div className="sat-map-area">
                  <div className={`loading-screen ${!satLoading ? 'hidden' : ''}`}>
                    <div className="loader-ring" style={{ borderTopColor: 'var(--accent2)' }}></div>
                    <div className="loader-text" style={{ color: 'var(--accent2)' }}>TRACKING ORBITAL OBJECTS...</div>
                  </div>
                  <div id="sat-map" style={{ width: '100%', height: '100%' }}></div>
                  {selectedSat && (() => {
                    const eta = calcETA(selectedSat, targetCoords);
                    const orbit = selectedSat.alt > 30000 ? 'GEO' : selectedSat.alt > 5000 ? 'MEO' : 'LEO';
                    return (
                      <div className="sat-detail visible">
                        <h3>{selectedSat.emoji} {selectedSat.name}</h3>
                        <div className="sat-detail-grid">
                          <div className="sdf"><label>LATITUDE</label><span>{selectedSat.lat.toFixed(3)}°</span></div>
                          <div className="sdf"><label>LONGITUDE</label><span>{selectedSat.lon.toFixed(3)}°</span></div>
                          <div className="sdf"><label>ALTITUDE</label><span>{selectedSat.alt} km</span></div>
                          <div className="sdf"><label>VELOCITY</label><span>{selectedSat.vel} km/s</span></div>
                          <div className="sdf"><label>ORBIT CLASS</label><span>{orbit}</span></div>
                          <div className="sdf"><label>ETA TO TARGET</label><span style={{ color: 'var(--accent3)' }}>{eta.text}</span></div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
                <div className="sat-sidebar">
                  <div className="sat-header">
                    SATELLITES <span style={{ fontSize: '11px', background: 'rgba(0,255,136,0.2)', padding: '1px 8px', border: '1px solid rgba(0,255,136,0.3)' }}>{satData.length}</span>
                    <button className="refresh-btn sat" onClick={loadSatellites}>↻ REFRESH</button>
                  </div>
                  <div className="sat-filters">
                    <div style={{ display: 'flex', gap: '6px' }}>
                      <div style={{ flex: 1 }}>
                        <label>TARGET COUNTRY (ETA)</label>
                        <select value={targetCountryVal} onChange={e => setTargetCountryVal(e.target.value)}>
                          <option value="20,77">🇮🇳 India</option>
                          <option value="17.4,78.5">📍 Hyderabad</option>
                          <option value="1.3,103.8">🇸🇬 Singapore</option>

                          <option value="46,2">🇫🇷 France</option>
                          <option value="38,-97">🇺🇸 USA</option>
                          <option value="37,127">🇰🇷 South Korea</option>

                          <option value="35,105">🇨🇳 China</option>

                          <option value="61,105">🇷🇺 Russia</option>

                      <div style={{ flex: 1 }}>

                        <select value={satTypeFilter} onChange={e => setSatTypeFilter(e.target.value)}>
                          <option value="">ALL TYPES</option>
                          <option value="SPACE STATION">SPACE STATION</option>
                          <option value="WEATHER">WEATHER</option>
                          <option value="EARTH OBS">EARTH OBS</option>
                          <option value="NAVIGATION">NAVIGATION</option>
                          <option value="COMMS">COMMS</option>
                          <option value="TELESCOPE">TELESCOPE</option>
                          <option value="MILITARY">MILITARY</option>
                          <option value="SCIENCE">SCIENCE</option>
                        </select>
                      </div>
                    </div>
                    <input type="text" placeholder="SEARCH SATELLITE NAME..." value={satSearch} onChange={e => setSatSearch(e.target.value)} />
                  </div>
                  <div className="sat-stats">
                    <div className="stat-box"><label>TRACKED</label><span>{satData.length}</span></div>
                    <div className="stat-box"><label>LEO SATS</label><span>{leoCount}</span></div>
                    <div className="stat-box"><label>NEAREST</label><span style={{ fontSize: '10px', color: 'var(--accent3)' }}>{nearestSatName}</span></div>
                    <div className="stat-box"><label>AVG SPEED</label><span>{avgSatVel} km/s</span></div>
                  </div>
                  <div className="sat-list">
                    {filteredSats.slice(0, 1000).map(sat => {
                      const eta = calcETA(sat, targetCoords);
                      return (
                        <div key={sat.id} className={`sat-item ${selectedSat?.id === sat.id ? 'selected' : ''}`} onClick={() => flyToSat(sat)}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '5px' }}>
                            <span className="type-dot" style={{ background: sat.color, boxShadow: `0 0 4px ${sat.color}` }}></span>
                            <span className="si-name">{sat.name}</span>
                          </div>
                          <div className="si-type">{sat.type} · {sat.alt > 30000 ? 'GEO' : sat.alt > 5000 ? 'MEO' : 'LEO'} · {sat.alt} km</div>
                          <div className="si-coords">LAT:{sat.lat.toFixed(1)}° LON:{sat.lon.toFixed(1)}° · {sat.vel}km/s</div>
                          <div className="si-eta"><span className={`eta-badge eta-${eta.badge}`}>⏱ {eta.text}</span></div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
              <div className="ticker">
                <div className="ticker-inner">
                  {[...satData, ...satData].map((s, i) => {
                    const eta = calcETA(s, targetCoords);

          <div className={`dashboard ${activeTab === 'ship' ? 'active' : ''}`} id="dash-ship">
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              <div className="flight-layout" style={{ flex: 1 }}>
                <div className="sidebar">
                  <div className="sidebar-header" style={{ color: 'var(--accent-ship)' }}>
                    LIVE VESSELS
                    <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                      <span className="flight-count" style={{ background: 'rgba(251,191,36,0.15)', borderColor: 'rgba(251,191,36,0.3)', color: 'var(--accent-ship)' }}>{shipData.length}</span>
                      <button className="refresh-btn ship" onClick={loadShips}>↻ SCAN</button>
                    </div>
                  </div>
                  <div className="filter-row">
                    <input type="text" placeholder="VESSEL / ROUTE..." value={shipSearch} onChange={e => setShipSearch(e.target.value)} style={{ background: 'rgba(251,191,36,0.05)' }} />
                    <select value={shipTypeFilter} onChange={e => setShipTypeFilter(e.target.value)} style={{ background: 'rgba(251,191,36,0.05)' }}>

                      {SHIP_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="flight-list">
                    {filteredShips.slice(0, 1000).map(shp => (
                      <div key={shp.id} className={`flight-item ship-item ${selectedShip?.id === shp.id ? 'selected' : ''}`} onClick={() => flyToShip(shp)}>

              cursor: pointer;
              transition: all .18s ease;
              border-left: 2px solid transparent;
            }
            .sat-item:hover, .sat-item.selected { background: rgba(52,211,153,0.07); border-left-color: var(--accent2); }
            .si-name { font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: var(--accent2-bright); font-weight: 600; }
            .si-type { font-size: 10px; color: var(--text-muted); margin-top: 1px; font-family: 'JetBrains Mono', monospace; }
            .si-coords { font-size: 10px; color: var(--text-dim); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
            .si-eta { margin-top: 3px; }

            .eta-badge { display: inline-block; padding: 2px 9px; font-size: 10px; font-family: 'JetBrains Mono', monospace; border-radius: 20px; }
            .eta-near { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.4); color: var(--accent3); }
            .eta-mid { background: rgba(192,132,252,0.15); border: 1px solid rgba(192,132,252,0.4); color: var(--accent4); }
            .eta-far { background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.25); color: var(--accent-bright); }

            .sat-detail {
              position: absolute; bottom: 14px; left: 14px;
              background: rgba(8,10,32,0.92);
              backdrop-filter: blur(16px);
              border: 1px solid rgba(52,211,153,0.35);
              border-radius: 10px;
              padding: 14px 18px;
              min-width: 290px;
              display: none;
              z-index: 1000;
              box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            }
            .sat-detail.visible { display: block; }
            .sat-detail h3 { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--accent2-bright); margin-bottom: 10px; }
            .sat-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
            .sdf label { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
            .sdf span { font-size: 13px; color: var(--accent2-bright); font-family: 'JetBrains Mono', monospace; display: block; margin-top: 2px; }

            .loading-screen { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
            .loading-screen.hidden { display: none; }
            .loader-ring {
              width: 48px; height: 48px;
              border: 2px solid rgba(129,140,248,0.15);
              border-top-color: var(--accent);
              border-radius: 50%;
              animation: spin 0.9s linear infinite;
              margin-bottom: 14px;
            }
            .loader-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent-bright); text-transform: uppercase; }
            @keyframes spin { to { transform: rotate(360deg) } }

            .ticker {
              background: rgba(8,10,32,0.9);
              backdrop-filter: blur(8px);
              border-top: 1px solid var(--border);
              height: 28px;
              overflow: hidden;
              position: relative;
              flex-shrink: 0;
            }
            .ticker::before {
              content: '';
              position: absolute; left: 0; top: 0; bottom: 0;
              width: 32px;
              background: linear-gradient(90deg, rgba(8,10,32,1), transparent);
              z-index: 2;
            }
            .ticker::after {
              content: '';
              position: absolute; right: 0; top: 0; bottom: 0;
              width: 32px;
              background: linear-gradient(-90deg, rgba(8,10,32,1), transparent);
              z-index: 2;
            }
            .ticker-inner { display: flex; align-items: center; height: 100%; white-space: nowrap; animation: ticker-scroll 90s linear infinite; }
            .ticker-item { padding: 0 28px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
            .ticker-item b { color: #fde68a; margin-right: 5px; }
            @keyframes ticker-scroll { from { transform: translateX(0) } to { transform: translateX(-50%) } }

            .leaflet-container { background: #05061a !important; font-family: inherit; }
            .leaflet-popup-content-wrapper {
              background: rgba(8,10,32,0.97) !important;
              border: 1px solid var(--border-bright) !important;
              border-radius: 10px !important;
              color: var(--text) !important;
              font-family: 'JetBrains Mono', monospace !important;
              font-size: 12px !important;
              box-shadow: 0 0 32px rgba(129,140,248,0.2) !important;
              backdrop-filter: blur(16px) !important;
            }
            .leaflet-popup-tip { background: rgba(99,102,241,0.4) !important; }
            .popup-title { font-family: 'Syne', sans-serif; font-size: 14px; color: #fde68a; font-weight: 700; margin-bottom: 8px; }
            .popup-title.sat-title { color: var(--accent2-bright); }
            .popup-row { display: flex; justify-content: space-between; gap: 14px; margin: 2px 0; font-size: 11px; }
            .popup-row span:first-child { color: var(--text-dim); }
            .popup-row span:last-child { color: var(--accent2-bright); }

            .refresh-btn {
              font-family: 'JetBrains Mono', monospace;
              font-size: 10px;
              background: rgba(129,140,248,0.1);
              border: 1px solid rgba(129,140,248,0.3);
              color: var(--accent-bright);
              padding: 4px 12px;
              cursor: pointer;
              transition: all .2s;
              border-radius: 5px;
              letter-spacing: 0.5px;
            }
            .refresh-btn:hover { background: rgba(129,140,248,0.2); }
            .refresh-btn.sat { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); color: var(--accent2-bright); }
            .refresh-btn.sat:hover { background: rgba(52,211,153,0.2); }
            .refresh-btn.ship { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); color: #fde68a; }
            .refresh-btn.ship:hover { background: rgba(251,191,36,0.2); }
            .refresh-btn.road { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: #fca5a5; }
            .refresh-btn.road:hover { background: rgba(248,113,113,0.2); }
            .type-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; flex-shrink: 0; }
          `}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
